<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Wedding Invitation</title>

  <!-- OPEN GRAPH / WHATSAPP PREVIEW -->
  <meta property="og:title" content="Wedding Invitation">

  <meta property="og:description" content="Theo & Disa">

  <meta property="og:image" content="https://theo-disa.vercel.app/preview.jpg">

  <meta property="og:url" content="https://theo-disa.vercel.app">

  <meta property="og:type" content="website">

  <meta property="og:image:width" content="1080">

  <meta property="og:image:height" content="1080">

  <!-- TWITTER / SOCIAL -->
  <meta name="twitter:card" content="summary_large_image">

  <!-- FONT CINZEL -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Cinzel', serif;
    }

    body{
      width:100%;
      height:100vh;
      overflow:hidden;
      background:#a8a39d;
    }

    .cover{
      width:100%;
      height:100vh;
      position:relative;

      /* GANTI background.jpg dengan foto kamu */
      background:
        url('background.jpg')
        center center/cover no-repeat;

      display:flex;
      justify-content:center;
      align-items:center;

      padding:40px 24px;
    }

    /* overlay */
    .overlay{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.05);
    }

    .content{
      position:relative;
      z-index:2;

      width:100%;
      max-width:400px;

      text-align:center;
      color:#000;

      /* POSISI KONTEN */
      transform:translateY(220px);
    }

    .label{
      font-size:15px;
      margin-bottom:14px;
      letter-spacing:1px;

      opacity:0;
      transform:translateY(20px);
      animation:fadeUp 1s ease forwards;
      animation-delay:0.2s;
    }

    .guest-name{
      font-size:38px;
      font-weight:600;
      line-height:1.3;

      margin-bottom:30px;

      opacity:0;
      transform:translateY(20px);
      animation:fadeUp 1s ease forwards;
      animation-delay:0.6s;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;

      width:100%;
      height:58px;

      background:#5b1b13;
      color:#fff;

      border-radius:999px;

      text-decoration:none;
      font-size:20px;
      font-weight:600;

      transition:.3s;

      box-shadow:
        0 10px 30px rgba(0,0,0,0.12);

      opacity:0;
      transform:translateY(20px);
      animation:fadeUp 1s ease forwards;
      animation-delay:1s;
    }

    .btn:hover{
      transform:scale(1.02);
    }

    /* ANIMASI */
    @keyframes fadeUp{

      from{
        opacity:0;
        transform:translateY(20px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    /* MOBILE */
    @media(max-width:480px){

      .content{
        transform:translateY(200px);
      }

      .guest-name{
        font-size:32px;
      }

      .btn{
        height:54px;
        font-size:18px;
      }

    }

  </style>
</head>

<body>

  <section class="cover">

    <div class="overlay"></div>

    <div class="content">

      <div class="label">
        Dear,
      </div>

      <div class="guest-name" id="guestName">
        Nama Tamu
      </div>

      <a href="#" class="btn" id="openBtn">
        Buka Undangan
      </a>

    </div>

  </section>

  <script>

    // AMBIL NAMA TAMU DARI URL
    // contoh:
    // ?to=Rina%20dan%20Keluarga

    const params = new URLSearchParams(window.location.search);

    const guest = params.get("to");

    if(guest){

      document.getElementById("guestName").innerText =
        decodeURIComponent(guest);

    }

    // LINK UNDANGAN
    const invitationLink =
      "https://wedding-ckcreative.my.canva.site/theo-disa";

    // TOMBOL BUKA UNDANGAN
    document
      .getElementById("openBtn")
      .addEventListener("click", function(e){

        e.preventDefault();

        window.location.href = invitationLink;

      });

  </script>

</body>
</html>
